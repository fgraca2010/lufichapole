name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes unitários/funcionais (Vitest)
        run: npm run test

      - name: Instalar psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Testes de banco (lufichapoledev, NUNCA produção)
        env:
          NEXT_PUBLIC_SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_DB_PASSWORD: ${{ secrets.SUPABASE_TEST_DB_PASSWORD }}
          SUPABASE_TEST_DB_POOLER_HOST: ${{ secrets.SUPABASE_TEST_DB_POOLER_HOST }}
          SUPABASE_TEST_DB_POOLER_PORT: ${{ secrets.SUPABASE_TEST_DB_POOLER_PORT }}
        run: bash scripts/test-db.sh
